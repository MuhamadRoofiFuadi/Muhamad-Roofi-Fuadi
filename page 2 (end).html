<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pengumpulan Data</title>
    <style>
    :root {
        --primary-gradient: linear-gradient(135deg, #279e31 0%, #e6e484 50%, #54d636 100%);
        --secondary-gradient: linear-gradient(135deg, #fffa96 0%, #cab600 100%);
        --text-dark: #2c3e50;
        --text-light: #5e9610;
    }

    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background: var(--primary-gradient);
        min-height: 100vh;
        padding: 20px;
        color: var(--text-dark);
    }

    .container {
        max-width: 800px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 2em;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }

    h1, h2 { 
        text-align: center; 
        color: var(--text-dark);
        margin-bottom: 1em;
    }

    h2 {
        border-bottom: 3px solid #cab600;
        display: inline-block;
        padding-bottom: 5px;
        font-size: 1.5em;
    }

    label { 
        display: block; 
        margin-top: 15px; 
        font-weight: bold; 
        color: var(--text-dark);
    }

    input, select { 
        width: 100%; 
        padding: 12px; 
        margin-top: 8px; 
        border: 1px solid #ddd;
        border-radius: 10px;
        box-sizing: border-box; 
    }

    /* Gaya Tombol agar sama dengan navigasi index */
    .btn-submit { 
        background: var(--secondary-gradient); 
        color: var(--text-dark); 
        font-weight: bold;
        padding: 12px 25px; 
        margin-top: 25px; 
        border: none; 
        border-radius: 50px;
        cursor: pointer; 
        width: 100%;
        transition: transform 0.3s;
    }

    .btn-submit:hover { 
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .btn-back {
        display: inline-block;
        text-decoration: none;
        color: white;
        background: rgba(0,0,0,0.3);
        padding: 10px 20px;
        border-radius: 50px;
        margin-bottom: 20px;
        font-size: 0.9em;
    }
</style>
</head>
<body>
       
        <h1>Terima Kasih Telah Mengisi Formulir Transaksi</h1>

        <div style="margin-bottom: 20px;">
        <a href="index.html" style="text-decoration: none;">
            <button type="button" style="background-color: #fbec66; color:#2c3e50; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;">
             Kembali ke Halaman Awal
            </button>
        </a>
    </div>

    </form>

    <div id="output"></div>

    <script>
        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const scriptURL = 'https://docs.google.com/spreadsheets/d/1kTuWWoItpiOCv1eOANnSURz-wDxB6-HPz6HSZH24kF4/edit?gid=0#gid=0';
const form = document.getElementById('dataForm');

form.addEventListener('submit', e => {
    e.preventDefault();
    
    console.log("Sedang mengirim data...");

    fetch(scriptURL, { 
        method: 'POST', 
        body: new FormData(form)
    })
    .then(response => {
        alert("Data berhasil tersimpan ke Google Sheets!");
        form.reset();
        document.getElementById('output').style.display = 'none';
    })
    .catch(error => console.error('Error!', error.message));
}); 


/* Animasi bintang jatuh */
function createStar() {
const star = document. createElement ("div");
star.classList.add("star");
star.innerHTML= "⭐"
star.style.left = Math.random() * 100 + "vw";
star. style.animationDuration - (3 + Math.random()
* 5) + "s";
document-body. appendChild (star);

setTimeout (() => {
star. remove();
},8000);

setInterval(createStar, 500);
</script>

</body>
</html>
