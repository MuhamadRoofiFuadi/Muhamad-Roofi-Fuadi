<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Tugas - Muhamad Roofi Fuadi</title>
    <style>
        :root {
            --sunset-yellow: #ffd23f;
            --lime-fresh: #a8e6cf;
            --emerald-deep: #2d5a47;
            --chartreuse: #c6e48b;
            --mint-gold: #e6ff9a;
            --shadow-sunset: 0 20px 50px rgba(255,210,63,0.35);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Roboto', 'Helvetica', Arial, sans-serif; 
            background: linear-gradient(135deg, var(--sunset-yellow) 0%, var(--lime-fresh) 45%, var(--mint-gold) 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 25px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 10% 90%, rgba(255,210,63,0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 10%, rgba(168,230,207,0.35) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(198,228,139,0.25) 0%, transparent 50%);
            animation: sunPulse 7s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes sunPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .container { 
            background: rgba(255,255,255,0.92); 
            backdrop-filter: blur(18px); 
            padding: 80px 60px; 
            border-radius: 45px; 
            box-shadow: var(--shadow-sunset); 
            max-width: 600px; 
            width: 100%;
            border: 2px solid rgba(255,210,63,0.4);
            position: relative;
            z-index: 2;
        }
        .header { 
            text-align: center; 
            margin-bottom: 60px; 
        }
        .sun-icon { 
            font-size: 4.5em; 
            background: linear-gradient(135deg, var(--sunset-yellow) 0%, var(--chartreuse) 50%, var(--lime-fresh) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 25px; 
            display: block;
            animation: sunRise 3s ease-out infinite alternate;
            filter: drop-shadow(0 6px 20px rgba(255,210,63,0.5));
        }
        @keyframes sunRise {
            from { transform: translateY(0px) scale(1); }
            to { transform: translateY(-8px) scale(1.08); }
        }
        h1 { 
            color: var(--emerald-deep); 
            font-size: 2.7em; 
            font-weight: 700; 
            letter-spacing: 2px; 
            margin-bottom: 15px;
            text-shadow: 0 4px 18px rgba(45,90,71,0.3);
        }
        .subtitle { 
            color: #4a7c59; 
            font-size: 1.3em; 
            font-weight: 500; 
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .prodi { 
            color: var(--sunset-yellow); 
            font-weight: 600; 
            font-size: 1.2em;
            text-shadow: 0 2px 8px rgba(255,210,63,0.6);
        }
        
        .daftar-buttons { 
            display: flex; 
            flex-direction: column; 
            gap: 40px;
        }
        .tugas-btn { 
            position: relative; 
            padding: 32px 50px; 
            font-size: 1.5em; 
            font-weight: 700; 
            border: 3px solid rgba(255,255,255,0.7); 
            border-radius: 35px; 
            cursor: pointer; 
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            transition: all 0.8s cubic-bezier(0.23, 1, 0.320, 1); 
            overflow: hidden;
            font-family: inherit;
            backdrop-filter: blur(20px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        }
        .tugas-btn::before { 
            content: ''; 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.6), transparent); 
            opacity: 0; 
            transition: all 0.8s;
            transform: translateX(-120%);
        }
        .tugas-btn:hover::before { 
            opacity: 1; 
            transform: translateX(120%);
        }
        
        .tugas1 { 
            background: linear-gradient(135deg, var(--lime-fresh) 0%, var(--chartreuse) 100%); 
            color: var(--emerald-deep); 
        }
        .tugas1:hover { 
            transform: translateY(-15px) scale(1.05); 
            border-color: var(--sunset-yellow); 
            box-shadow: 0 35px 70px rgba(168,230,207,0.45);
        }
        
        .tugas2 { 
            background: linear-gradient(135deg, var(--sunset-yellow) 0%, var(--mint-gold) 100%); 
            color: var(--emerald-deep); 
        }
        .tugas2:hover { 
            transform: translateY(-15px) scale(1.05); 
            border-color: var(--lime-fresh); 
            box-shadow: 0 35px 70px rgba(255,210,63,0.5);
        }
        .tugas3:hover { 
            background: linear-gradient(135deg, var(--lime-fresh) 0%, var(--chartreuse) 100%); 
            color: var(--emerald-deep); 
        }
        .tugas3:hover { 
            transform: translateY(-15px) scale(1.05); 
            border-color: var(--sunset-yellow); 
            box-shadow: 0 35px 70px rgba(168,230,207,0.45);
        }
        .btn-icon { 
            font-size: 2.3em; 
            filter: drop-shadow(0 3px 10px rgba(0,0,0,0.25));
        }
        .btn-title { 
            font-size: 1.3em; 
            letter-spacing: 2.5px; 
            text-transform: uppercase; 
            font-weight: 800;
        }
        .btn-subtitle { 
            font-size: 0.95em; 
            opacity: 0.95; 
            font-weight: 400; 
            letter-spacing: 1.2px;
        }
        
        footer { 
            margin-top: 90px; 
            color: var(--emerald-deep); 
            font-size: 1.1em; 
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 3px 10px rgba(0,0,0,0.15);
        }
        
        @media (max-width: 550px) {
            .container { padding: 65px 45px; margin: 20px; }
            h1 { font-size: 2.3em; }
            .sun-icon { font-size: 3.5em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="sun-icon">🌟</div>
            <h1>Muhamad Roofi Fuadi</h1>
            <p class="subtitle">Sistem Informasi Manajemen</p>
            <p class="prodi">Sosial Ekonomi Perikanan</p>
            <p class="prodi">Universitas Lambung Mangkurat</p>
        </div>
        
        <div class="daftar-buttons">
            <a href="page 1.html" class="tugas-btn tugas1" target="_blank">
                <span class="btn-icon">📊</span>
                <span class="btn-title">Tugas 1</span>
                <span class="btn-subtitle">Biodata Diri</span>
            </a>
            <a href="page 2.html" class="tugas-btn tugas2" target="_blank">
                <span class="btn-icon">🏦</span>
                <span class="btn-title">Tugas 2</span>
                <span class="btn-subtitle">Formulir Transaksi</span>
            </a>
            <a href="page 3.html" class="tugas-btn tugas3" target="_blank">
                <span class="btn-icon">📋</span>
                <span class="btn-title">Tugas 3</span>
                <span class="btn-subtitle">Google Form</span>
            </a>
        </div>
    </div>

    <footer>
        <p>🌞 Tugas SIM-P | Dibuat untuk memenuhi tugas Bapak Muhammad Adnan Zain, S.Pi, M.P</p>
    </footer>
</body>
</html>
